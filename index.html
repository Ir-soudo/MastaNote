<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MastaNote AI+</title>
    
    <!-- Description SEO et Manifeste PWA -->
    <meta name="description" content="Assistant de gestion des notes pour enseignants du Primaire au Bénin, compatible EducMaster." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0e1a" />
    
    <!-- Support Mobile / Apple -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MastaNote" />

    <!-- Importation propre de la police Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Script de secours Tailwind CDN (uniquement si votre build local ne le compile pas déjà) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuration propre du thème de l'application -->
    <style>
      /* 
       * Styles de base légers et non-destructifs. 
       * Empêche uniquement le flash blanc au chargement sans casser le reste des classes.
       */
      html {
        background-color: #0a0e1a; /* Fond bleu nuit original de MastaNote */
        color-scheme: dark; /* Force les barres de défilement du navigateur en mode sombre */
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0e1a;
        margin: 0;
        padding: 0;
      }

      /* Style élégant et discret pour la barre de défilement de l'application */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0e1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
    </style>
  </head>
  <body class="antialiased">
    <!-- Point d'entrée de votre application React / Vite -->
    <div id="root"></div>
    
    <!-- Script principal de l'application -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
